[toolchain]
anchor_version = "0.31.1"
solana_version = "2.0.21"

[features]
resolution = true
skip-lint = false

# Placeholder program IDs. These are valid base58 32-byte pubkeys derived
# deterministically from SHA-256 seeds; they are NOT real keypairs and have no
# secret. Run `anchor keys list && anchor keys sync` after generating real
# keypairs to update both these entries and the `declare_id!` calls in lib.rs.
[programs.localnet]
grave_scanner = "7ZZ78chnUh5iipPgwR4L8fT8wKFmUM7kauRzjaYARr9m"
grave_vault   = "FZbMHXKRsgXXoEGfSPF5gw74ThKBauThDfpCPt1MvKfw"

[programs.devnet]
# Filled in at devnet deploy time.

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "Localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "pnpm exec ts-mocha -p ./tsconfig.json -t 1000000 'tests/**/*.ts'"

[test.validator]
url = "https://api.mainnet-beta.solana.com"

[[test.validator.clone]]
# Raydium V4 program (cloned from mainnet for fork tests).
address = "675kPX9MHTjS2zt1qfr1NYHuzeLXfQM9H24wFSUt1Mp8"
