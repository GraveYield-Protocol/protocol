name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Aligned with the official Solana 3.x stack:
  # https://solana.com/docs/intro/installation
  SOLANA_VERSION: 3.0.10
  ANCHOR_VERSION: 0.32.1
  # Host toolchain. Must match rust-toolchain.toml.
  RUST_TOOLCHAIN: 1.91.1
  NODE_VERSION: 24
  PNPM_VERSION: 9

jobs:
  rust-fmt:
    name: cargo fmt --check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt
      - run: cargo fmt --all -- --check

  rust-clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings

  anchor-build:
    name: anchor build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@v2
      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${SOLANA_VERSION}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"
      # cargo-binstall fetches a prebuilt anchor-cli binary in ~10s instead
      # of compiling from source (~5-7 min, which has been intermittently
      # cancelled on ubuntu-latest runners during the dependency-fetch
      # phase). Drops total anchor-build job time from ~10 min to ~2 min.
      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main
      - name: Install Anchor CLI
        run: cargo binstall --no-confirm --version ${ANCHOR_VERSION} anchor-cli
      # Capture anchor build's full output to a file and upload it as a
      # workflow artifact when the job fails — needed because the actual
      # error message is otherwise only visible via the GitHub Actions
      # web UI logs page (the Composio integration this repo uses for
      # programmatic CI inspection does not expose log download).
      - name: Anchor build
        run: |
          set -o pipefail
          anchor build 2>&1 | tee /tmp/anchor-build.log
      - name: Upload anchor build log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: anchor-build-log
          path: /tmp/anchor-build.log
          if-no-files-found: warn
          retention-days: 7

  ts-typecheck:
    name: pnpm typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # pnpm/action-setup@v6 requires Node.js to already be installed
      # (upstream removed the bundled Node in v6). setup-node MUST come
      # first. The previous floating-tag failure at install time was this
      # ordering, not a regression in v6.0.7/v6.0.8.
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      # pnpm/action-setup@v6 auto-detects pnpm version from the
      # `packageManager` field in package.json (pnpm@9.12.0). No explicit
      # `version:` input — that field is what we want to be the single
      # source of truth for the pnpm pin anyway.
      - uses: pnpm/action-setup@v6
      # NOTE: `cache: pnpm` was removed from setup-node. setup-node hashes
      # `**/pnpm-lock.yaml` to compute the cache key, and no lockfile is
      # committed yet (scaffold gap). Re-add once a `pnpm-lock.yaml` lands
      # at the repo root.
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm -r typecheck

  terminology-lint:
    name: terminology lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Forbidden vocabulary check
        run: bash scripts/terminology-lint.sh
