name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SOLANA_VERSION: 2.0.21
  ANCHOR_VERSION: 0.31.1
  # Host toolchain. Must match rust-toolchain.toml — the modern SPL crate
  # ecosystem (digest 0.11 / block-buffer 0.12) requires edition2024 = 1.85+.
  # The on-chain BPF build still uses Solana platform-tools' embedded Rust.
  RUST_TOOLCHAIN: 1.85.0
  NODE_VERSION: 20
  PNPM_VERSION: 9

jobs:
  rust-fmt:
    name: cargo fmt --check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt
      - run: cargo fmt --all -- --check

  rust-clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings

  anchor-build:
    name: anchor build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@v2
      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${SOLANA_VERSION}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"
      - name: Install Anchor CLI
        run: cargo install --locked --version ${ANCHOR_VERSION} anchor-cli
      - name: Anchor build
        run: anchor build

  ts-typecheck:
    name: pnpm typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Pinned to v6.0.6 (2026-05-08) — v6.0.7 (2026-05-11) and v6.0.8
      # (2026-05-12) regress at install time, failing the action in ~7s
      # before pnpm even runs. Revisit once upstream confirms a fix.
      - uses: pnpm/action-setup@v6.0.6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      # NOTE: `cache: pnpm` was removed. setup-node hashes `**/pnpm-lock.yaml`
      # to compute the cache key, and no lockfile is committed yet (scaffold
      # gap). Re-add once a `pnpm-lock.yaml` lands at the repo root.
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm -r typecheck

  terminology-lint:
    name: terminology lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Forbidden vocabulary check
        run: bash scripts/terminology-lint.sh
