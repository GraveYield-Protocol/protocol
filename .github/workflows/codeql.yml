name: CodeQL

# CodeQL requires GitHub Advanced Security to run on private repos. The job is
# gated below so it skips automatically while the repo is private and engages
# the moment it flips public for devnet/audit prep — no workflow edit needed.
# When public, optionally re-enable the weekly schedule trigger.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # schedule:
  #   - cron: "37 5 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    if: ${{ !github.event.repository.private }}
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
